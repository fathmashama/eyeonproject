<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .btn-action { min-width: 200px; }
    .stat-card { text-align: center; padding: 20px; }
    .stat-card h2 { color: #007bff; font-weight: bold; }
    .stat-card h6 { color: #666; }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">👁️ Eye On Project - Attendance Dashboard</span>
    <div>
      <span class="me-3 text-white">Admin: {{ admin }}</span>
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4">📊 Dashboard Overview</h2>
  
  <!-- Stats -->
  <div class="row mb-5">
    <div class="col-md-4 mb-3">
      <div class="card stat-card">
        <h6>Total Employees</h6>
        <h2>{{ total }}</h2>
      </div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="card stat-card">
        <h6 style="color: green;">Present Today</h6>
        <h2 style="color: green;">{{ present }}</h2>
      </div>
    </div>
    <div class="col-md-4 mb-3">
      <div class="card stat-card">
        <h6 style="color: red;">Absent Today</h6>
        <h2 style="color: red;">{{ absent }}</h2>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="row">
    <div class="col-md-12">
      <div class="card p-4">
        <h5 class="mb-4">⚡ Quick Actions</h5>
        <div class="d-flex flex-wrap gap-3">
          <a href="{{ url_for('register') }}" class="btn btn-primary btn-lg btn-action">
            👤 Register Employee
          </a>
          <button class="btn btn-success btn-lg btn-action" onclick="startFaceRecognition()" id="faceBtn">
            🎥 Run Face Recognition
          </button>
          <a href="{{ url_for('attendance') }}" class="btn btn-info btn-lg btn-action">
            📋 View Attendance
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Message -->
  <div class="row mt-4">
    <div class="col-md-12">
      <div id="status-msg" class="alert alert-info d-none" role="alert">
        <span id="status-text">Processing...</span>
      </div>
    </div>
  </div>
</div>

<script>
function startFaceRecognition() {
  const btn = document.getElementById('faceBtn');
  const statusMsg = document.getElementById('status-msg');
  const statusText = document.getElementById('status-text');
  
  btn.disabled = true;
  btn.innerText = '⏳ Running...';
  statusMsg.classList.remove('d-none');
  statusText.innerText = 'Starting face recognition... Please wait.';
  
  fetch('/api/run-recognition', {
    method: 'POST'
  })
  .then(response => response.json())
  .then(data => {
    if (data.error) {
      statusMsg.classList.remove('alert-info');
      statusMsg.classList.add('alert-danger');
      statusText.innerText = '❌ Error: ' + data.error;
    } else {
      statusMsg.classList.remove('alert-info');
      statusMsg.classList.add('alert-success');
      statusText.innerText = '✅ Face recognition complete! ' + data.count + ' faces marked. Refreshing...';
      setTimeout(() => {
        location.reload();
      }, 2000);
    }
    btn.disabled = false;
    btn.innerText = '🎥 Run Face Recognition';
  })
  .catch(err => {
    statusMsg.classList.remove('alert-info');
    statusMsg.classList.add('alert-danger');
    statusText.innerText = '❌ Error: ' + err.message;
    btn.disabled = false;
    btn.innerText = '🎥 Run Face Recognition';
  });
}
</script>

</body>
</html>
